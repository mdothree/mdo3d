<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #2d1b69 0%, #4c2fa0 50%, #1a1a24 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #4c2fa0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 56px;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: -2px;
    }
    h1 em {
      font-style: italic;
      color: #c4b5f4;
    }
    p {
      font-size: 22px;
      color: #9090a8;
      text-align: center;
      max-width: 700px;
      line-height: 1.5;
    }
    .badge {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-size: 14px;
      color: #5a5a72;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="logo">M3</div>
  <h1>MDO3D<br><em>AI Platform Ecosystem</em></h1>
  <p>Building AI-powered platforms across spiritual guidance, professional development, productivity, and commerce.</p>
  <div class="badge">mdo3d.com</div>
</body>
</html>
