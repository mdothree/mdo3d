<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #03020a 0%, #1f1550 50%, #2d1b69 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }
    .symbol {
      width: 100px;
      height: 100px;
      margin-bottom: 40px;
      color: #c4b5f4;
      font-size: 72px;
    }
    h1 {
      font-size: 48px;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    h1 em {
      font-style: italic;
      color: #c4b5f4;
    }
    .subtitle {
      font-size: 24px;
      color: #9090a8;
      text-align: center;
      margin-bottom: 30px;
    }
    .features {
      display: flex;
      gap: 40px;
      color: #5a5a72;
      font-size: 16px;
    }
    .features span { color: #c4b5f4; }
    .badge {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-size: 14px;
      color: #5a5a72;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="symbol">✦</div>
  <h1>Guidance <em>MDO3D</em></h1>
  <p class="subtitle">AI-Powered Spiritual Insight</p>
  <div class="features">
    <div><span>🔮</span> Oracle Cards</div>
    <div><span>🌙</span> Dream Interpretation</div>
    <div><span>🃏</span> Tarot</div>
    <div><span>🔢</span> Numerology</div>
  </div>
  <div class="badge">guidance.mdo3d.com</div>
</body>
</html>
