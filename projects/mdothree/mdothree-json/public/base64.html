  <main class="tool-page" id="main-content">
    <div class="container">
      <div class="tool-header animate-fade-up">
        <div class="breadcrumb"><a href="index.html">JSON Tools</a><span>/</span> Base64</div>
        <h1>🔐 Base64 ↔ JSON</h1>
        <p>Encode JSON to Base64 or decode Base64 strings back to JSON.</p>
      </div>

      <div class="panel animate-fade-up-2">
        <div class="tabs">
          <button class="tab-btn active" data-mode="encode">JSON → Base64</button>
          <button class="tab-btn" data-mode="decode">Base64 → JSON</button>
        </div>

        <div id="modeEncode">
          <div class="form-group">
            <label class="form-label">JSON Input</label>
            <textarea class="form-textarea" id="jsonInput" style="min-height:200px;font-size:0.82rem;" placeholder='{"key": "value"}'></textarea>
          </div>
          <div class="toggle-group">
            <label class="toggle"><input type="checkbox" id="urlSafe" /><span class="toggle-slider"></span></label>
            <span class="toggle-label">URL-safe Base64 (replace +/ with -_)</span>
          </div>
          <button class="btn btn-primary mt-16" id="encodeBtn">🔐 Encode to Base64</button>
          <div class="form-group mt-16" id="encodeOutput" style="display:none;">
            <label class="form-label">Base64 Output</label>
            <div style="position:relative;">
              <div class="code-output" id="base64Output" style="word-break:break-all;"></div>
              <button class="btn btn-secondary" id="copyEncoded" style="position:absolute;top:10px;right:10px;padding:6px 12px;font-size:0.78rem;">Copy</button>
            </div>
          </div>
        </div>

        <div id="modeDecode" class="hidden">
          <div class="form-group">
            <label class="form-label">Base64 Input</label>
            <textarea class="form-textarea" id="base64Input" style="min-height:140px;font-size:0.82rem;" placeholder="Paste Base64 encoded JSON..."></textarea>
          </div>
          <button class="btn btn-primary mt-16" id="decodeBtn">🔓 Decode to JSON</button>
          <div class="form-group mt-16" id="decodeOutput" style="display:none;">
            <label class="form-label">JSON Output</label>
            <div style="position:relative;">
              <div class="code-output" id="jsonOutput" style="min-height:200px;"></div>
              <button class="btn btn-secondary" id="copyDecoded" style="position:absolute;top:10px;right:10px;padding:6px 12px;font-size:0.78rem;">Copy</button>
            </div>
          </div>
        </div>

        <div id="alertArea" class="mt-16"></div>
      </div>
    </div>
  </main>
