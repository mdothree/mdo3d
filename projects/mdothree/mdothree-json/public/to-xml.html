  <main class="tool-page" id="main-content">
    <div class="container">
      <div class="tool-header animate-fade-up">
        <div class="breadcrumb"><a href="index.html">JSON Tools</a><span>/</span> JSON → XML</div>
        <h1>🏷️ JSON → XML</h1>
        <p>Convert JSON objects to valid XML structure.</p>
      </div>
      <div class="tool-layout" class="animate-fade-up-2">
        <div class="panel">
          <div class="panel-title">JSON Input</div>
          <textarea class="form-textarea" id="inputJson" style="min-height:360px;font-size:0.82rem;" placeholder='{"user": {"name": "Alice", "age": 30}}'></textarea>
          <div class="form-group mt-16">
            <label class="form-label">Root element name</label>
            <input type="text" class="form-input" id="rootEl" value="root" style="max-width:200px;" />
          </div>
          <div class="toggle-group">
            <label class="toggle"><input type="checkbox" id="xmlDecl" checked /><span class="toggle-slider"></span></label>
            <span class="toggle-label">Include XML declaration</span>
          </div>
          <button class="btn btn-primary mt-16" id="convertBtn">→ Convert to XML</button>
        </div>
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div class="panel-title" style="border:none;margin:0;padding:0;">XML Output</div>
            <div class="btn-group">
              <button class="btn btn-ghost" id="copyBtn" style="padding:6px 12px;font-size:0.78rem;">Copy</button>
              <button class="btn btn-ghost" id="dlBtn" style="padding:6px 12px;font-size:0.78rem;display:none;">⬇️ .xml</button>
            </div>
          </div>
          <div class="code-output" id="output" style="min-height:400px;"></div>
          <div id="alertArea" class="mt-12"></div>
